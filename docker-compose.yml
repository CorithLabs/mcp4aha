version: '3.8'

services:
  aha-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: aha-mcp-server:latest
    container_name: aha-mcp
    ports:
      - "${PORTAL_PORT:-3000}:3000"   # Admin portal
      - "${MCP_PORT:-3001}:3001"      # MCP SSE server
    environment:
      - NODE_ENV=production
      - PORTAL_PORT=3000
      - MCP_PORT=3001
      - HOST=0.0.0.0
      # Optional: pre-seed MCP token via env var (overrides DB value)
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      # Optional: pre-seed Aha company via env var (overrides DB value)
      - AHA_COMPANY=${AHA_COMPANY:-}
    restart: unless-stopped
    volumes:
      # Persistent SQLite data volume — survives container restarts
      - aha-mcp-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  aha-mcp-data:
    name: aha-mcp-data
    driver: local
